name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify web framework resolution
        run: |
          pnpm --filter web exec node -p "require.resolve('next/package.json')"
          pnpm --filter web exec node -p "require.resolve('react/package.json')"
          pnpm --filter web exec node -p "require.resolve('react-dom/package.json')"
          pnpm --filter web list next react react-dom --depth 0

      - name: Repo doctor
        run: pnpm repo:doctor

      - name: Web typecheck
        run: pnpm --filter web typecheck

      - name: Web build
        run: pnpm --filter web build

      - name: Web smoke
        run: pnpm --filter web smoke

      - name: Write bundled CI logs
        if: always()
        run: bash scripts/dev/ci-web-validate.sh || true

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: ci-logs/
          if-no-files-found: ignore
