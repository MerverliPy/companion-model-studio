selection_order:
  - explicit_user_scope
  - highest_priority
  - same_module_followup
  - smallest_safe_scope
  - clearest_validation

constraints:
  max_files_changed: 5
  prefer_single_module: true
  avoid_generic_tasks: true

candidates:
  - id: workflow-reconciliation
    module: workflow
    priority: 11
    drivers:
      - reconcile workflow artifacts with canonical shipped state
      - keep active phase selection and ledger behavior ship-safe
    files:
      - README.md
      - AGENTS.md
      - .opencode/backlog/candidates.yaml
      - .opencode/backlog/completed.yaml
      - .opencode/plans/current-phase.md
    validation: run the repo workflow validation command defined by the phase
    acceptance:
      - workflow docs match canonical shipped behavior
      - active phase naming is ship-safe
      - next unshipped product candidate remains clearly identified

  - id: foundation-workspace-bootstrap
    module: workspace
    priority: 10
    drivers:
      - establish runnable local-first foundation
      - create minimal app shell before feature work
    files:
      - apps/web
      - package.json
      - pnpm-workspace.yaml
    validation: install dependencies and verify the initial workspace scaffold succeeds
    acceptance:
      - workspace manifests exist
      - apps/web exists
      - initial scaffold is runnable

  - id: studio-shell-and-routing
    module: web
    priority: 9
    drivers:
      - create the first visible product shell
      - make the app navigable
    files:
      - apps/web/app/layout
      - apps/web/app/page
      - apps/web/app routes
    validation: run the web app validation command defined by the phase
    acceptance:
      - app shows Companion Model Studio shell
      - top-level navigation exists
      - placeholder sections exist for Create, Lessons, Progress, Chat

  - id: local-model-connectivity
    module: web
    priority: 8
    drivers:
      - verify local runtime health
      - enable model listing and selection
    files:
      - apps/web runtime layer
      - apps/web api routes
      - runtime status UI
    validation: run the runtime connectivity validation command defined by the phase
    acceptance:
      - runtime health endpoint exists
      - UI shows connected/disconnected state
      - local model list can be displayed

  - id: companion-creation-wizard
    module: web
    priority: 8
    drivers:
      - core product identity flow
      - create first companion record
    files:
      - apps/web create flow
      - companion form
      - companion validation schema
    validation: run the companion creation validation command defined by the phase
    acceptance:
      - user can enter name, bio, template, avatar theme
      - submission persists a draft companion
      - validation errors display correctly

  - id: skill-pack-selection
    module: web
    priority: 7
    drivers:
      - make companions configurable for use cases
      - expose skill-pack choices
    files:
      - skill pack definitions
      - skill picker UI
      - create flow review step
    validation: run the skill selection validation command defined by the phase
    acceptance:
      - user can select one or more skill packs
      - selection persists with companion draft
      - selected skills appear in review step

  - id: lessons-and-evals
    module: evals
    priority: 7
    drivers:
      - convert schooling concept into a measurable loop
      - create repeatable scoring
    files:
      - eval package
      - lessons UI
      - eval runner
    validation: run the lesson/eval validation command defined by the phase
    acceptance:
      - at least one lesson pack exists
      - lesson runs produce a score/result object
      - results can be stored and displayed

  - id: progress-and-badges
    module: web
    priority: 6
    drivers:
      - visualize companion growth
      - reward progress
    files:
      - progress view
      - badges logic
      - badge cabinet UI
    validation: run the progress validation command defined by the phase
    acceptance:
      - progress view exists
      - badges unlock from deterministic rules
      - recent achievement list is visible

  - id: chat-workbench
    module: web
    priority: 6
    drivers:
      - make the product usable beyond setup
      - expose companion in live chat
    files:
      - chat page
      - chat panel
      - chat api route
    validation: run the chat validation command defined by the phase
    acceptance:
      - user can open a local chat session
      - selected companion context is applied
      - messages render in a stable chat UI

  - id: runtime-model-selection-e2e
    module: web
    priority: 12
    drivers:
      - make local model selection real across ui api and runtime
      - remove hidden first-model-wins behavior from chat execution
    files:
      - apps/web/app/components/runtime-status.tsx
      - apps/web/app/components/chat-workbench.tsx
      - apps/web/app/api/chat/route.ts
      - apps/web/lib/runtime/ollama.ts
      - apps/web/lib/runtime/model-selection-store.ts
    validation: run pnpm --filter web validate
    acceptance:
      - selected runtime model is saved for the local chat session
      - chat requests include selectedModel
      - runtime chat uses selectedModel instead of the first available model
      - missing or stale selected models fail clearly instead of silently falling back

  - id: chat-request-schema-hardening
    module: web
    priority: 11
    drivers:
      - harden the /api/chat boundary
      - reject malformed or oversized chat payloads before runtime dispatch
    files:
      - apps/web/package.json
      - apps/web/app/api/chat/route.ts
      - apps/web/lib/chat/chat-request-schema.ts
      - apps/web/lib/runtime/ollama.ts
      - apps/web/app/components/chat-workbench.tsx
    validation: run pnpm --filter web validate
    acceptance:
      - /api/chat parses request bodies through a schema layer
      - malformed payloads return stable 400 responses with useful error details
      - message role count length and selectedModel invariants are enforced before runtime dispatch
      - chat ui handles schema rejection without corrupting the local session

  - id: server-backed-lesson-results
    module: web
    priority: 8
    drivers:
      - move lesson result persistence out of browser localStorage
      - make lessons and progress read from the same sqlite-backed result history
    files:
      - apps/web/app/api/lesson-results/route.ts
      - apps/web/lib/evals/result-store.ts
      - apps/web/lib/evals/result-repository.ts
      - apps/web/app/components/lesson-attempt-panel.tsx
      - apps/web/app/progress/page.tsx
    validation: run pnpm --filter web validate
    acceptance:
      - running a lesson writes a result row to sqlite via prisma
      - progress reads persisted lesson history from the server-backed repository
      - result ordering and recent-achievement derivation remain stable after reload
      - localStorage is no longer the canonical lesson result source

  - id: server-backed-chat-session
    module: web
    priority: 7
    drivers:
      - move active chat session storage out of browser localStorage
      - make local chat reload-safe from sqlite while staying single-user and local-first
    files:
      - apps/web/app/api/chat-sessions/route.ts
      - apps/web/lib/chat/session-store.ts
      - apps/web/lib/chat/chat-session-repository.ts
      - apps/web/app/components/chat-workbench.tsx
      - apps/web/app/chat/page.tsx
    validation: run pnpm --filter web validate
    acceptance:
      - active chat session is loaded from sqlite on page open
      - sending a message persists both user and assistant messages to sqlite
      - full page reload preserves session history without relying on localStorage
      - localStorage is no longer the canonical chat session source
